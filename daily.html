<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 추천곡</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #EDF7FF;
  --text: #1A1A1A;
  --muted: #A8A49E;
  --border: #E8E4DE;
}
html, body {
  height: 100%; height: 100dvh;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  display: flex; align-items: center; justify-content: center;
  padding: 32px 24px;
  overflow: hidden;
}

/* ──────────────────────────────── STEP 1 ─── */
#step1 {
  width: 100%; max-width: 340px;
  display: flex; flex-direction: column;
  animation: fadeIn .5s ease both;
}
.s1-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: .22em;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 20px;
}
.s1-heading {
  font-size: 32px; font-weight: 400; line-height: 1.2;
  color: var(--text); margin-bottom: 40px;
  word-break: keep-all;
}
.s1-heading em { font-style: normal; font-weight: 800; }

.s1-field { position: relative; margin-bottom: 32px; }
.s1-field input {
  width: 100%; padding: 16px 0 14px;
  font-size: 18px; font-family: inherit;
  background: transparent; border: none;
  border-bottom: 1.5px solid var(--text);
  outline: none; color: var(--text);
  transition: border-color .2s;
}
.s1-field input:focus { border-bottom-color: var(--text); }
.s1-field input::placeholder { color: var(--muted); }
.s1-field input.shake { animation: shake .3s; }

.s1-btn {
  align-self: flex-start;
  display: flex; align-items: center; gap: 10px;
  padding: 15px 26px;
  background: var(--text); color: #fff;
  border: none; border-radius: 99px;
  font-size: 14px; font-weight: 700; font-family: inherit;
  letter-spacing: .04em; cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.s1-btn:hover { opacity: .82; transform: translateX(3px); }

/* ──────────────────────────────── STEP 2 ─── */
#step2 {
  display: none;
  width: 100%; max-width: 360px;
  flex-direction: column; align-items: center;
  gap: 20px;
}
#step2.active {
  display: flex;
  animation: fadeUp .55s cubic-bezier(.4,0,.2,1) both;
}

.result-for {
  font-size: 13px; color: var(--text);
  text-align: center; line-height: 1.65;
}
.result-for .rf-sub  { font-weight: 500; display: block; }
.result-for .rf-main { font-weight: 500; font-size: 15px; display: block; }
.result-for .rf-name { text-decoration: underline; text-underline-offset: 3px; }

/* ── THE CARD ── */
.card {
  width: 100%;
  border-radius: 28px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 16px 48px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.08);
  transform: translateZ(0);
  will-change: transform;
}

/* 블러 배경 — 커버 이미지를 쭉 펴서 블러 */
.card-blur {
  position: absolute; inset: 0;
  background-size: cover; background-position: center;
  filter: blur(36px) saturate(1.6) brightness(1.05);
  transform: scale(1.25);
  opacity: .55;
  transition: background-image .4s;
}
/* 배경 위 화이트 베일 — 가독성 확보 */
.card-veil {
  position: absolute; inset: 0;
  background: rgba(255,255,255,.48);
}

/* 카드 실제 콘텐츠 */
.card-body {
  position: relative; z-index: 1;
  padding: 24px 24px 20px;
  display: flex; flex-direction: column;
}

/* 상단: 작은 커버 + 곡 정보 (가로 배치) */
.song-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}

/* 커버 아트 — 작게 */
.cover-wrap {
  width: 56px; height: 56px;
  border-radius: 10px; overflow: hidden; flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(0,0,0,.22);
  position: relative;
}
.cover-wrap img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.cover-fallback {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, #c9c5be, #a09b93);
}
.cover-fallback-letter {
  font-size: 20px; font-weight: 900; color: rgba(255,255,255,.45);
}

/* 아티스트 / 곡명 */
.song-meta { flex: 1; min-width: 0; }
.song-artist {
  font-size: 11px; font-weight: 600; letter-spacing: .04em;
  color: rgba(0,0,0,.4); margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.song-title {
  font-size: 19px; font-weight: 800; line-height: 1.2;
  color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* 구분선 */
.card-divider {
  width: 100%; height: 1px;
  background: rgba(0,0,0,.1);
  margin-bottom: 18px;
}

/* 가사 */
.lyrics-block {
  width: 100%; display: flex; flex-direction: column; gap: 2px;
  margin-bottom: 16px;
  transform: translateZ(0);
}
.lyric-line {
  font-size: 20px; font-weight: 700; line-height: 1.55;
  color: var(--text);
  opacity: 0; transform: translate3d(0, 5px, 0);
  transition: opacity .4s ease, transform .4s ease;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}
.lyric-line.visible { opacity: 1; transform: translate3d(0, 0, 0); }

/* Spotify */
.spotify-row {
  width: 100%; display: flex; justify-content: flex-end;
}
.spotify-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 42px; height: 42px;
  background: rgba(255,255,255,0.32);
  border: 1px solid rgba(255,255,255,0.5);
  border-radius: 50%; color: #fff;
  cursor: pointer; text-decoration: none;
  box-shadow: 0 2px 8px rgba(0,0,0,.12);
  transition: transform .15s, background .15s;
  flex-shrink: 0;
}
.spotify-btn:hover { transform: scale(1.08); background: rgba(255,255,255,0.46); }

/* ──────────────────────────────── UTILS ─── */
@keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
@keyframes fadeUp  { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
@keyframes shake   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@keyframes spin    { to { transform: rotate(360deg); } }

/* loading */
.loading-wrap { text-align: center; }
.spin {
  width: 28px; height: 28px; margin: 0 auto 12px;
  border: 2px solid var(--border); border-top-color: var(--muted);
  border-radius: 50%; animation: spin .7s linear infinite;
}
.spin-label { font-size: 12px; color: var(--muted); }

/* ──────────────────────────────── ADMIN ─── */
.gear-btn {
  position: fixed; top: 16px; right: 16px;
  width: 32px; height: 32px; border-radius: 50%;
  background: #fff; border: 1px solid var(--border);
  display: none; align-items: center; justify-content: center;
  cursor: pointer; font-size: 14px; z-index: 200;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
  transition: transform .3s;
}
.gear-btn.visible { display: flex; }
.gear-btn:hover { transform: rotate(45deg); }
.settings-panel {
  position: fixed; top: 56px; right: 16px; width: 280px;
  background: #fff; border: 1px solid var(--border); border-radius: 14px;
  padding: 18px; box-shadow: 0 8px 32px rgba(0,0,0,.1);
  display: none; z-index: 200; font-size: 12px; line-height: 1.8;
}
.settings-panel.open { display: block; }
.sp-title { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text); margin-bottom: 8px; }
.sp-body  { color: var(--muted); }
.sp-body b { color: var(--text); }
.sp-status { color: var(--muted); font-size: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<button class="gear-btn" id="gearBtn" onclick="toggleSettings()">⚙️</button>
<div class="settings-panel" id="settingsPanel">
  <div class="sp-title">곡 목록 관리</div>
  <div class="sp-body">
    시트 컬럼 순서:<br>
    <b>A: 아티스트 · B: 곡명 · C: 커버URL<br>D: 가사 (| 로 줄 구분) · E: Spotify URL</b><br><br>
    시트를 <b>링크 공개 → 뷰어</b>로 설정해주세요.
  </div>
  <div class="sp-status" id="syncStatus">마지막 동기화: —</div>
</div>

<!-- ─── STEP 1 ─── -->
<div id="step1">
  <div class="s1-heading">당신을 위한,<br><em>오늘의 추천곡</em></div>
  <div class="s1-field">
    <input type="text" id="nicknameInput" placeholder="이름을 입력하세요"
           maxlength="20" onkeydown="if(event.key==='Enter') goResult()">
  </div>
  <button class="s1-btn" onclick="goResult()">
    추천받기
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- ─── STEP 2 ─── -->
<div id="step2">
  <div class="result-for" id="resultFor"></div>

  <div class="card" id="theCard">
    <div class="card-blur" id="cardBlur"></div>
    <div class="card-veil"></div>
    <div class="card-body">

      <!-- 커버(작게) + 곡 정보 가로 배치 -->
      <div class="song-header">
        <div class="cover-wrap" id="coverWrap">
          <div class="cover-fallback" id="coverFallback">
            <span class="cover-fallback-letter" id="coverLetter"></span>
          </div>
        </div>
        <div class="song-meta">
          <div class="song-artist" id="songArtist"></div>
          <div class="song-title"  id="songTitle"></div>
        </div>
      </div>

      <div class="card-divider"></div>

      <!-- 가사 -->
      <div class="lyrics-block" id="lyricsBlock"></div>

      <!-- Spotify -->
      <div class="spotify-row" id="spotifyRow"></div>

    </div>
  </div>
</div>

<script>
const SHEET_ID = '1icpsPXRqbE1jrfUwsv-xjkBhZpWX7mjdNrQoAAyiPtk';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;
const DAYS     = ['일','월','화','수','목','금','토'];

const FALLBACK = [
  { artist:'윤준', title:'밑 빠진 나',
    coverUrl:'https://image.bugsm.co.kr/album/images/original/208060/20806057.jpg',
    lyrics:'빗소리처럼|자연스럽게|스며드는 곡이에요',
    spotifyUrl:'' },
  { artist:'블낫블(blue is not blue)', title:'paradise',
    coverUrl:'https://image.bugsm.co.kr/album/images/original/207433/20743316.jpg',
    lyrics:'오늘은 왠지|좋은 일이|생길 것 같아요',
    spotifyUrl:'' },
];

let songs = [], songsReady = false, nickname = '', pendingResult = false;
const IS_ADMIN = new URLSearchParams(location.search).has('admin');
if (IS_ADMIN) document.getElementById('gearBtn').classList.add('visible');


fetchSheet();

async function fetchSheet() {
  try {
    const res = await fetch(CSV_URL + `&_c=${new Date().toDateString()}`);
    if (!res.ok) throw new Error();
    const parsed = parseCSV(await res.text());
    songs = parsed.length ? parsed : FALLBACK;
    if (IS_ADMIN) {
      document.getElementById('syncStatus').textContent =
        `마지막 동기화: ${new Date().toLocaleTimeString('ko-KR')} · ${songs.length}곡`;
    }
  } catch { songs = FALLBACK; }
  songsReady = true;
  if (pendingResult) { pendingResult = false; renderResult(); }
}

function parseCSV(text) {
  // 컬럼 순서: A:SpotifyURL / B:아티스트 / C:곡명 / D:가사 / E:커버URL
  const rows = [];
  const lines = text.split('\n');
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    const cols = splitCSVLine(line);
    if (cols.length < 2) continue;
    const [spotifyRaw, artist, title, lyrics, coverUrl] = cols;
    if (!artist || !title) continue;
    rows.push({
      artist: artist.trim(), title: title.trim(),
      coverUrl: (coverUrl || '').trim(),
      lyrics: (lyrics || '').trim(),
      spotifyUrl: (spotifyRaw || '').trim(),
    });
  }
  return rows;
}

function splitCSVLine(line) {
  const r = []; let cur = '', inQ = false;
  for (const c of line) {
    if (c === '"') { inQ = !inQ; continue; }
    if (c === ',' && !inQ) { r.push(cur); cur = ''; continue; }
    cur += c;
  }
  r.push(cur);
  return r.map(s => s.trim());
}

function goResult() {
  const val = document.getElementById('nicknameInput').value.trim();
  if (!val) {
    const inp = document.getElementById('nicknameInput');
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 350);
    inp.focus();
    return;
  }
  nickname = val;

  if (!songsReady) {
    document.getElementById('step1').innerHTML =
      `<div class="loading-wrap"><div class="spin"></div>
       <div class="spin-label">잠깐만요...</div></div>`;
    pendingResult = true;
  } else {
    renderResult();
  }
}

function renderResult() {
  if (!songs.length) return;
  const song = songs[hash(nickname + today()) % songs.length];

  // 헤더 날짜
  const d = new Date();
  const dateStr = `${d.getMonth()+1}월 ${d.getDate()}일 ${DAYS[d.getDay()]}요일`;
  const josa = eul(nickname);
  document.getElementById('resultFor').innerHTML =
    `<span class="rf-sub"><span class="rf-name">${nickname}</span>${josa} 위한</span>
     <span class="rf-main">${dateStr} 추천곡</span>`;

  // 아티스트 / 곡명
  document.getElementById('songArtist').textContent = song.artist;
  document.getElementById('songTitle').textContent  = song.title;

  // 커버 아트 + 블러 배경
  const wrap    = document.getElementById('coverWrap');
  const fallback = document.getElementById('coverFallback');
  const letter  = document.getElementById('coverLetter');
  const blurEl  = document.getElementById('cardBlur');
  const oldImg  = wrap.querySelector('img');
  if (oldImg) oldImg.remove();

  letter.textContent = song.artist.slice(0,1).toUpperCase();
  fallback.style.display = 'flex';

  if (song.coverUrl) {
    const img = document.createElement('img');
    img.src = song.coverUrl;
    img.alt = song.title;
    img.crossOrigin = 'anonymous';
    img.onload = () => { fallback.style.display = 'none'; };
    img.onerror = () => img.remove();
    wrap.appendChild(img);
    blurEl.style.backgroundImage = `url('${song.coverUrl}')`;
  } else {
    blurEl.style.backgroundImage = '';
  }

  // 가사
  const lyricsBlock = document.getElementById('lyricsBlock');
  lyricsBlock.innerHTML = '';
  const lines = song.lyrics
    ? song.lyrics.split('/').map(l => l.trim()).filter(Boolean).slice(0, 5)
    : [];
  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'lyric-line';
    el.textContent = line;
    lyricsBlock.appendChild(el);
    setTimeout(() => el.classList.add('visible'), 250 + i * 130);
  });

  // Spotify
  const row = document.getElementById('spotifyRow');
  row.innerHTML = song.spotifyUrl
    ? `<a class="spotify-btn" href="${song.spotifyUrl}" target="_blank" rel="noopener" title="Spotify에서 듣기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.51 17.34c-.22.34-.67.45-1.01.23-2.77-1.69-6.26-2.07-10.36-1.13-.4.09-.79-.16-.88-.55-.09-.4.16-.79.55-.88 4.49-1.03 8.34-.59 11.45 1.31.35.22.45.67.25 1.02zm1.47-3.27c-.27.43-.85.56-1.28.29-3.17-1.95-8.01-2.52-11.76-1.38-.49.15-1.01-.13-1.15-.61-.14-.49.13-1.01.61-1.15 4.29-1.3 9.62-.67 13.28 1.57.43.26.57.84.3 1.28zm.13-3.41c-3.81-2.26-10.1-2.47-13.74-1.37-.58.18-1.2-.15-1.38-.73-.18-.58.15-1.2.73-1.38 4.19-1.27 11.15-1.03 15.54 1.59.52.31.69 1 .38 1.52-.31.51-1 .68-1.53.37z"/>
        </svg></a>`
    : '';

  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').classList.add('active');
}

// 한국어 을/를 조사: 마지막 글자 받침 유무로 판단
function eul(s) {
  if (!s) return '을';
  const last = s[s.length - 1];
  const code = last.charCodeAt(0);
  if (code < 0xAC00 || code > 0xD7A3) return '를'; // 영문·숫자 등
  return (code - 0xAC00) % 28 !== 0 ? '을' : '를';
}

function hash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return Math.abs(h);
}
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

let settingsOpen = false;
function toggleSettings() {
  settingsOpen = !settingsOpen;
  document.getElementById('settingsPanel').classList.toggle('open', settingsOpen);
}
document.addEventListener('click', e => {
  if (!e.target.closest('.gear-btn') && !e.target.closest('.settings-panel')) {
    settingsOpen = false;
    document.getElementById('settingsPanel').classList.remove('open');
  }
});
</script>
</body>
</html>
